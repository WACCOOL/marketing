name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "apps/generator/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      include_container:
        description: "Rebuild and deploy the generation Container (requires a token with container registry permissions)"
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web SPA
        # Vite inlines VITE_* at build time, so these must be present here or the
        # SPA ships with an empty Supabase config and crashes on load.
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SHORT_LINK_HOST: https://gowac.cc
          VITE_API_BASE_URL: ""
        run: pnpm --filter @wac/web build

      # By default we deploy the Worker + static assets and skip the Container
      # (its image rarely changes and the registry push needs extra token
      # scopes). Trigger the workflow manually with include_container=true to
      # rebuild and roll out the Container.
      - name: Deploy Worker + assets
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_container }}" = "true" ]; then
            pnpm exec wrangler deploy
          else
            pnpm exec wrangler deploy --containers-rollout none
          fi
