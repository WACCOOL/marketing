name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "apps/generator/**"
      - "apps/thom-bot/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      include_container:
        description: "Rebuild and deploy the generation Container (requires a token with container registry permissions)"
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web SPA
        # Vite inlines VITE_* at build time, so these must be present here or the
        # SPA ships with an empty Supabase config and crashes on load.
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SHORT_LINK_HOST: https://gowac.cc
          VITE_API_BASE_URL: ""
        run: pnpm --filter @wac/web build

      # By default we deploy the Worker + static assets and skip the Container
      # (its image rarely changes and the registry push needs extra token
      # scopes). Trigger the workflow manually with include_container=true to
      # rebuild and roll out the Container.
      - name: Deploy Worker + assets
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_container }}" = "true" ]; then
            # immediate = roll the new image to 100% of instances in one step.
            # NOTE: already-warm pool containers still keep the old image until
            # they idle out + cold-restart (sleepAfter) — see README + CLAUDE.md.
            pnpm exec wrangler deploy --containers-rollout immediate
          else
            pnpm exec wrangler deploy --containers-rollout none
          fi

  # PUBLIC Thom Bot Worker (wac-thom-bot) + its embeddable widget. Independent of
  # the api/web deploy (its own custom domain thom.gowac.cc, no Container). The
  # widget is built into apps/thom-bot/public first, then the Worker + assets ship
  # together. Guarded so it can't fail the pipeline before Davis provisions the KV
  # namespace / vars / secrets — it self-skips while the KV id is a placeholder,
  # and the deploy step is continue-on-error for any other missing-config case.
  deploy-thom-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Thom widget
        run: pnpm --filter @wac/thom-bot build:widget

      - name: Deploy Thom Bot Worker + widget assets
        working-directory: apps/thom-bot
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if grep -q "REPLACE_WITH_THOM_KV_NAMESPACE_ID" wrangler.jsonc; then
            echo "THOM_KV id is still the placeholder — skipping wac-thom-bot deploy"
            echo "until the KV namespace + vars/secrets are provisioned. See MEMORY / docs."
            exit 0
          fi
          pnpm exec wrangler deploy
