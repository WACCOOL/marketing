name: Docs Ingest

# Thom Bot Tier-B ingestion: fetch the pending spec sheets + manuals (captured
# by the saleslayer doc capture and the products-sync spec-sheet resolver),
# extract text (born-digital + Claude-vision fallback), chunk, embed via Workers
# AI, and fill kb_chunks. Resumable (the row status is the checkpoint), so a
# capped run just resumes next time. Daily after products-sync (which writes the
# re-derived spec-sheet URLs).
on:
  schedule:
    - cron: "0 11 * * *" # daily 11:00 UTC (after the 09:00 products-sync)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (count pending, no writes)"
        type: boolean
        default: false
      limit:
        description: "Max documents to process this run (blank = all)"
        type: string
        default: ""
      retry_failed:
        description: "Requeue previously-failed docs (e.g. transient 502s) and retry them"
        type: boolean
        default: false
      dimming:
        description: "Run ONLY the dimming-chart structured extraction (--dimming; dimming plan §B)"
        type: boolean
        default: false
      sample:
        description: "With dimming: process at most N units and print the verification report (sample-then-STOP gate)"
        type: string
        default: ""

concurrency:
  group: docs-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build docs-ingest
        run: pnpm --filter @wac/docs-ingest build
      - name: Run docs ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Thom Bot — ZenDesk Help Center article capture (Step C). ACTIVE:
          # ZENDESK_* creds live as GitHub secrets (added 2026-07-17); the flag
          # below is a non-secret toggle committed here (repo convention). Brand
          # tagging is off until ZENDESK_HC_BRAND_MAP (a section/category-id ->
          # brand JSON) is supplied — until then articles ingest with brand=null
          # and are fully searchable, just not brand-filterable.
          ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_SUBDOMAIN }}
          ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_API_TOKEN }}
          THOM_ZENDESK_ARTICLES: "1"
          ZENDESK_HC_BRAND_MAP: ${{ secrets.ZENDESK_HC_BRAND_MAP }}
          ZENDESK_HC_LOCALE: "en-us"
          # Internal-ticket capture is gated Worker-side (THOM_ZENDESK_TICKETS);
          # the CLI extracts whatever zendesk_ticket rows are pending regardless,
          # reusing the ZENDESK_* creds above to read the ticket + public comments
          # (which it PII-redacts before embedding). Passed through for parity.
          THOM_ZENDESK_TICKETS: ${{ secrets.THOM_ZENDESK_TICKETS }}
          # R2 access — REQUIRED for admin-uploaded education PDFs
          # (kb/admin_uploads/*, read by the admin_upload extraction branch) and
          # reused as the crawled-page cache. Same pattern as site-crawl.yml;
          # the secrets already exist org-side.
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: wac-marketing-assets
        run: >-
          pnpm --filter @wac/docs-ingest ingest --
          ${{ inputs.dry_run && '--dry-run' || '' }}
          ${{ inputs.retry_failed && '--retry-failed' || '' }}
          ${{ inputs.limit && format('--limit {0}', inputs.limit) || '' }}
          ${{ inputs.dimming && '--dimming' || '' }}
          ${{ inputs.sample && format('--sample {0}', inputs.sample) || '' }}
